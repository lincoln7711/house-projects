<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Current Work</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #293241;
    --surface: #3D5B81;
    --surface2: #2d3f55;
    --border: #4a6d8c;
    --accent: #EE6B4D;
    --accent2: #9BC0D9;
    --text: #DFFBFC;
    --muted: #9BC0D9;
    --success: #4caf76;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding: 0 0 60px;
  }

  header {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 20px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.08em;
    color: var(--text);
    line-height: 1;
  }

  header p {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 4px;
  }

  .accent-bar {
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    margin-top: 14px;
    border-radius: 2px;
  }

  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    font-size: 0.78rem;
    color: var(--muted);
  }

  .refresh-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 100px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    padding: 6px 14px;
    transition: all 0.15s;
  }

  .refresh-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  .cards {
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 600px;
    margin: 0 auto;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.15s;
  }

  .card-header {
    padding: 14px 16px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .card-title {
    font-size: 1rem;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
  }

  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }

  .tag {
    background: var(--surface2);
    border-radius: 100px;
    color: var(--muted);
    font-size: 0.72rem;
    padding: 3px 10px;
    white-space: nowrap;
  }

  .priority-tag {
    font-weight: 500;
    font-size: 0.72rem;
    padding: 3px 10px;
    border-radius: 100px;
  }

  .p1 { background: #7f1d1d; color: #fca5a5; }
  .p2 { background: #78350f; color: #fcd34d; }
  .p3 { background: #1e3a5f; color: #93c5fd; }
  .p4 { background: var(--surface2); color: var(--muted); }

  .status-tag {
    font-size: 0.72rem;
    padding: 3px 10px;
    border-radius: 100px;
    font-weight: 500;
  }

  .status-not-started    { background: var(--surface2); color: var(--muted); }
  .status-in-progress    { background: #1a3a2a; color: #6ee7b7; }
  .status-waiting        { background: #2d2a1a; color: #fcd34d; }
  .status-on-hold        { background: #2d1a2a; color: #d8b4fe; }
  .status-completed      { background: #1a2a1a; color: #4ade80; }
  .status-other-required { background: #2a1a1a; color: #fca5a5; }

  .expand-icon {
    margin-left: auto;
    color: var(--muted);
    font-size: 0.8rem;
    transition: transform 0.2s;
    flex-shrink: 0;
  }

  .card.open .expand-icon { transform: rotate(180deg); }

  .card-body {
    display: none;
    border-top: 1px solid var(--border);
    padding: 14px 16px;
    gap: 14px;
    flex-direction: column;
  }

  .card.open .card-body { display: flex; }

  .notes-block {
    font-size: 0.88rem;
    color: var(--accent2);
    line-height: 1.6;
    white-space: pre-wrap;
  }

  .notes-empty {
    font-size: 0.82rem;
    color: var(--muted);
    font-style: italic;
  }

  .control-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .control-label {
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .control-row select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    padding: 10px 12px;
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    cursor: pointer;
  }

  .control-row select:focus {
    outline: none;
    border-color: var(--accent);
  }

  .pill-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .pill-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    padding: 6px 14px;
    transition: all 0.15s;
  }

  .pill-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 500;
  }

  .save-btn {
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #fff;
    cursor: pointer;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.08em;
    padding: 12px;
    width: 100%;
    transition: opacity 0.15s;
  }

  .save-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .save-btn.saved { background: var(--success); }

  .loading {
    text-align: center;
    color: var(--muted);
    padding: 60px 20px;
    font-size: 0.9rem;
  }

  .empty {
    text-align: center;
    color: var(--muted);
    padding: 60px 20px;
  }

  .empty h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 0.05em;
    color: var(--accent2);
    margin-bottom: 8px;
  }

  #toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--success);
    color: #fff;
    font-size: 0.9rem;
    font-weight: 500;
    padding: 14px 28px;
    border-radius: 100px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
  }

  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.error { background: #c0392b; }
</style>
</head>
<body>

<header>
  <h1>Current Work</h1>
  <p>Active projects &amp; tasks</p>
  <div class="accent-bar"></div>
</header>

<div class="toolbar">
  <span id="countLabel">Loading…</span>
  <button class="refresh-btn" onclick="loadItems()">↻ Refresh</button>
</div>

<div class="cards" id="cards">
  <div class="loading">Loading your current work…</div>
</div>

<div id="toast"></div>

<script>
const STATUSES = [
  { value: 'Not Started',                          label: 'Not Started',       cls: 'status-not-started' },
  { value: 'In Progress',                          label: 'In Progress',       cls: 'status-in-progress' },
  { value: 'Waiting on Supplies',                  label: 'Waiting on Supplies', cls: 'status-waiting' },
  { value: 'Progress Stopped - On Hold (See Notes)', label: 'On Hold',         cls: 'status-on-hold' },
  { value: 'Completed',                            label: 'Completed',         cls: 'status-completed' },
  { value: 'Other Work Required First (See Notes)', label: 'Other Work First', cls: 'status-other-required' },
];

const PRIORITIES = ['P1', 'P2', 'P3', 'P4'];

function statusCls(val) {
  const s = STATUSES.find(s => s.value === val);
  return s ? s.cls : 'status-not-started';
}

function statusLabel(val) {
  const s = STATUSES.find(s => s.value === val);
  return s ? s.label : val;
}

function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (isError ? ' error' : '');
  setTimeout(() => { t.className = ''; }, 3000);
}

async function loadItems() {
  document.getElementById('countLabel').textContent = 'Loading…';
  document.getElementById('cards').innerHTML = '<div class="loading">Loading your current work…</div>';

  try {
    const res = await fetch('/.netlify/functions/notion-read', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({})
    });
    const data = await res.json();

    if (data.error) {
      document.getElementById('cards').innerHTML = `<div class="loading">Error: ${data.error}</div>`;
      return;
    }

    const items = data.results || [];
    document.getElementById('countLabel').textContent = `${items.length} item${items.length !== 1 ? 's' : ''}`;

    if (items.length === 0) {
      document.getElementById('cards').innerHTML = `
        <div class="empty">
          <h2>All clear</h2>
          <p>No items flagged as Current Work.</p>
        </div>`;
      return;
    }

    document.getElementById('cards').innerHTML = items.map(item => renderCard(item)).join('');

  } catch (err) {
    document.getElementById('cards').innerHTML = `<div class="loading">Network error — tap Refresh to try again.</div>`;
  }
}

function getProp(props, key, type) {
  const p = props[key];
  if (!p) return null;
  if (type === 'title') return p.title?.map(t => t.plain_text).join('') || '';
  if (type === 'select') return p.select?.name || null;
  if (type === 'rich_text') return p.rich_text?.map(t => t.plain_text).join('') || '';
  if (type === 'formula') return p.formula?.string || null;
  return null;
}

function renderCard(item) {
  const p = item.properties;
  const title    = getProp(p, 'Description', 'title') || 'Untitled';
  const room     = getProp(p, 'Room', 'select') || '';
  const timeNeeded = getProp(p, 'Time Needed', 'select') || '';
  const status   = getProp(p, 'Status', 'select') || 'Not Started';
  const priority = getProp(p, 'Priority (displayed)', 'formula') || 'P4';
  const notes    = getProp(p, 'Notes', 'rich_text') || '';
  const id       = item.id;

  const priorityPills = PRIORITIES.map(p => `
    <button class="pill-btn ${p === priority ? 'active' : ''}"
      onclick="setPriority('${id}', '${p}', this)">${p}</button>
  `).join('');

  const statusOptions = STATUSES.map(s => `
    <option value="${s.value}" ${s.value === status ? 'selected' : ''}>${s.label}</option>
  `).join('');

  return `
    <div class="card" id="card-${id}">
      <div class="card-header" onclick="toggleCard('${id}')">
        <div style="display:flex;align-items:flex-start;gap:8px;">
          <div class="card-title" style="flex:1">${title}</div>
          <span class="expand-icon">▾</span>
        </div>
        <div class="card-meta">
          <span class="status-tag ${statusCls(status)}">${statusLabel(status)}</span>
          <span class="priority-tag ${priority.toLowerCase()}">${priority}</span>
          ${room ? `<span class="tag">${room}</span>` : ''}
          ${timeNeeded ? `<span class="tag">${timeNeeded}</span>` : ''}
        </div>
      </div>
      <div class="card-body">
        <div>
          ${notes
            ? `<div class="notes-block">${notes}</div>`
            : `<div class="notes-empty">No notes</div>`}
        </div>
        <div class="control-row">
          <div class="control-label">Status</div>
          <select id="status-${id}" onchange="markDirty('${id}')">
            ${statusOptions}
          </select>
        </div>
        <div class="control-row">
          <div class="control-label">Priority</div>
          <div class="pill-row" id="priority-${id}">
            ${priorityPills}
          </div>
        </div>
        <button class="save-btn" id="save-${id}" onclick="saveCard('${id}')" disabled>Save Changes</button>
      </div>
    </div>
  `;
}

function toggleCard(id) {
  const card = document.getElementById(`card-${id}`);
  card.classList.toggle('open');
}

function markDirty(id) {
  const btn = document.getElementById(`save-${id}`);
  if (btn) { btn.disabled = false; btn.textContent = 'Save Changes'; btn.classList.remove('saved'); }
}

function setPriority(id, priority, el) {
  const row = document.getElementById(`priority-${id}`);
  row.querySelectorAll('.pill-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  markDirty(id);
}

async function saveCard(id) {
  const btn = document.getElementById(`save-${id}`);
  btn.disabled = true;
  btn.textContent = 'Saving…';

  const status = document.getElementById(`status-${id}`).value;
  const priorityRow = document.getElementById(`priority-${id}`);
  const priority = priorityRow.querySelector('.pill-btn.active')?.textContent || 'P4';

  try {
    const res = await fetch('/.netlify/functions/notion-write', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, status, priority })
    });

    const data = await res.json();

    if (data.error) {
      showToast('Error saving — try again', true);
      btn.disabled = false;
      btn.textContent = 'Save Changes';
    } else {
      btn.textContent = '✓ Saved';
      btn.classList.add('saved');
      showToast('✓ Updated');

      // update the visible status tag
      const card = document.getElementById(`card-${id}`);
      const statusTag = card.querySelector('.status-tag');
      statusTag.className = `status-tag ${statusCls(status)}`;
      statusTag.textContent = statusLabel(status);

      const priorityTag = card.querySelector('.priority-tag');
      priorityTag.className = `priority-tag ${priority.toLowerCase()}`;
      priorityTag.textContent = priority;
    }
  } catch (err) {
    showToast('Network error', true);
    btn.disabled = false;
    btn.textContent = 'Save Changes';
  }
}

loadItems();
</script>
</body>
</html>
